name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing
        # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
        run: npm install -g npm@latest
      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi
          echo "Version $pkg_version confirmed."
      - run: npm install
      - run: npm run build
      - name: Publish to npm
        # Tokenless: npm trusted publishing (OIDC) via id-token: write. The
        # package's trusted publisher on npmjs.com authorizes this repo +
        # workflow + environment. Provenance is generated automatically.
        run: npm publish --provenance --access public

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
