name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi
          echo "Version $pkg_version confirmed."
      - run: npm install
      - run: npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
        # Auth via NPM_TOKEN. npm trusted publishing (OIDC) cannot be configured
        # until the package exists, so the first release uses a token. After the
        # package is live you may set up a trusted publisher on npmjs.com and
        # remove this env block to publish tokenlessly. --provenance still works
        # with a token because the job has id-token: write. See RELEASING.md.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
